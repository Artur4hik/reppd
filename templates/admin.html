<!DOCTYPE html>
<html>
<head>
    <title>Admin panel</title>
</head>
<body>

<h1>Користувачі</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Password</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user[0] }}</td>
        <td>{{ user[1] }}</td>
        <td>{{ user[2] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
